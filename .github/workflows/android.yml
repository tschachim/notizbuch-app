# Baut die Android-WebView-Hülle als APK und veröffentlicht sie als
# GitHub-Release "android-apk" (fester Download-Link). Die App lädt nur die
# Live-Website – sie muss also praktisch nie neu gebaut werden.
#
# Hinweis Signatur: signiert wird mit einem pro Lauf erzeugten Debug-Key.
# Ein NEU gebautes APK hat dadurch eine andere Signatur; vor einer
# Neuinstallation muss die alte App deinstalliert werden. Da die App nur
# ein Browser-Rahmen ist, ist das bewusst so gewählt (kein privater
# Schlüssel im öffentlichen Repo).
name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: APK bauen (debug-signiert)
        run: gradle -p android assembleDebug

      - name: APK umbenennen
        run: cp android/app/build/outputs/apk/debug/app-debug.apk notizbuch.apk

      - name: Als Release "android-apk" veröffentlichen (fester Link)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete android-apk --yes --cleanup-tag || true
          gh release create android-apk notizbuch.apk \
            --title "Notizbuch Android-App" \
            --notes "WebView-Hülle um https://tschachim.github.io/notizbuch-app/ – die App lädt immer die aktuelle Website, ein App-Update ist nicht nötig. Installation: APK herunterladen, Installation aus unbekannten Quellen erlauben. Bei Neuinstallation eines neueren APK vorher die alte App deinstallieren (wechselnde Debug-Signatur)."
